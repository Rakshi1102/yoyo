<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    
</head>
<style>
    #box{
        text-align: center;
        height: 100px;
        width: 100px;
        background-color: brown;
       
    }
    #circle{
        text-align: center;
        
        height: 100px;
        width: 100px;
        background-color: aqua;
        border-radius: 25%;

    }
    #rectangle{
        text-align: center;
        text-decoration-color: azure;
        height: 100px;
        width: 100px;
        background-color: rgb(211, 202, 202);
        border-radius: 50%;

    }
    #square{
        text-align: center;
        height: 100px;
        width: 100px;
        background-color: blue;

    }
    #tri{
        text-align: center;
        height: 100px;
        width: 100px;
        background-color: chartreuse;
        border-radius: 25%;

    }
    #oval{
        text-align: center;
    
        height: 100px;
        width: 100px;
        
        
        background-color: yellow;
        border-radius: 50%;
    }
    
    #shape{
        text-align: center;
        height: 180px;
        width: 150px;
        background-color: coral;

    }
    #cone{
        text-align: center;
        height: 200px;
        width: 140px;
    background-color: springgreen;
    border-radius: 60%;
    }
    #rhombus{
        text-align: center;
        height: 100px;
        width: 200px;
        background-color: darkorange;
        border-radius: 20%;
    }
    #diamond{
        text-align: center;
        text-decoration: solid;
        height: 100px;
        width: 100px;
background-color: darkred;

border-radius: 100%;
    }

</style>
<body>
    
    <p id="box">Box</p>
    
    <p id="circle">Rectangle</p>
    <p id="rectangle">circle</p>
    <p id="square">Square</p>
    <p id="tri">Tri</p>
    <p id="oval">Oval</p>
    <p id="shape">shape</p>
    <p id="cone">cone</p>
    <p id="rhombus">rhombus</p>
    <p id="diamond">diamond</p>
     
</body>
</html>
